# gpass.val.id - Reverse proxy to gpass project
# Port: 8850 (adjust if needed)

server {
    server_name gpass.val.id;

    # === Security Headers ===
    include /etc/nginx/snippets/security-headers.conf;

    # === Gzip ===
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    client_max_body_size 50m;

    # === Reverse Proxy ===
    location / {
        proxy_pass http://127.0.0.1:8850;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;
        proxy_buffering off;

        # Security headers
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "no-cache";
    }

    # === SSL (managed by Certbot) ===
    listen [::]:443 ssl;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/gpass.val.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gpass.val.id/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# HTTP -> HTTPS redirect
server {
    if ($host = gpass.val.id) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    listen [::]:80;
    server_name gpass.val.id;
    return 404;
}
