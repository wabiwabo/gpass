apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: bff-pdb
  namespace: garudapass
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: bff
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: keycloak-pdb
  namespace: garudapass
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: keycloak
---
# Backend services PDBs — protect against simultaneous eviction during
# node drains. minAvailable: 1 with replicas: 2 means at least one pod
# is always serving traffic, even mid-cluster-upgrade.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: identity-pdb
  namespace: garudapass
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: identity
---
