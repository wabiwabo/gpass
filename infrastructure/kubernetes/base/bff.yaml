apiVersion: apps/v1
kind: Deployment
metadata:
  name: bff
  namespace: garudapass
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bff
  template:
    metadata:
      labels:
        app: bff
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: bff
      containers:
        - name: bff
          image: garudapass/bff:latest
          ports:
            - containerPort: 4000
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            - name: BFF_PORT
              value: "4000"
            - name: KEYCLOAK_URL
              value: http://keycloak:8080
            - name: KEYCLOAK_REALM
              value: garudapass
            - name: KEYCLOAK_CLIENT_ID
              value: bff-client
            - name: REDIS_URL
              value: redis://redis:6379
            - name: BFF_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: bff-secrets
                  key: session-secret
            - name: BFF_FRONTEND_URL
              value: https://garudapass.id
            - name: BFF_REDIRECT_URI
              value: https://garudapass.id/auth/callback
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: bff
  namespace: garudapass
spec:
  selector:
    app: bff
  ports:
    - port: 4000
      targetPort: 4000
