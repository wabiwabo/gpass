---
# Identity Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity
  namespace: garudapass
  labels:
    app: identity
    monitoring: "true"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: identity
  template:
    metadata:
      labels:
        app: identity
        monitoring: "true"
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: identity
      containers:
        - name: identity
          image: garudapass/identity:latest
          ports:
            - containerPort: 4001
              name: http
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: IDENTITY_PORT
              value: "4001"
            - name: DUKCAPIL_MODE
              value: "real"
            - name: DUKCAPIL_URL
              valueFrom:
                configMapKeyRef:
                  name: service-config
                  key: dukcapil-url
            - name: SERVER_NIK_KEY
              valueFrom:
                secretKeyRef:
                  name: identity-secrets
                  key: nik-key
            - name: FIELD_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: identity-secrets
                  key: field-encryption-key
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: url
            - name: OTP_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: redis-secrets
                  key: url
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 4001
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 4001
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: identity
  namespace: garudapass
  labels:
    monitoring: "true"
spec:
  selector:
    app: identity
  ports:
    - port: 4001
      targetPort: 4001
      name: http
