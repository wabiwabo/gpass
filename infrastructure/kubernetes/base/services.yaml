# GarudaSign Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: garudasign
  namespace: garudapass
  labels:
    app: garudasign
    monitoring: "true"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: garudasign
  template:
    metadata:
      labels:
        app: garudasign
        monitoring: "true"
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: garudasign
          image: garudapass/garudasign:latest
          ports:
            - containerPort: 4007
              name: http
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: GARUDASIGN_PORT
              value: "4007"
            - name: SIGNING_MODE
              value: "real"
            - name: EJBCA_URL
              valueFrom:
                configMapKeyRef:
                  name: service-config
                  key: ejbca-url
            - name: DSS_URL
              valueFrom:
                configMapKeyRef:
                  name: service-config
                  key: dss-url
            - name: GARUDASIGN_DB_URL
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: url
            - name: IDENTITY_SERVICE_URL
              value: http://identity:4001
            - name: DOCUMENT_STORAGE_PATH
              value: /data/signing
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          volumeMounts:
            - name: signing-data
              mountPath: /data/signing
          livenessProbe:
            httpGet:
              path: /health
              port: 4007
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 4007
            initialDelaySeconds: 3
            periodSeconds: 5
      volumes:
        - name: signing-data
          persistentVolumeClaim:
            claimName: garudasign-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: garudasign
  namespace: garudapass
  labels:
    monitoring: "true"
spec:
  selector:
    app: garudasign
  ports:
    - port: 4007
      targetPort: 4007
      name: http
