---
# Secrets template (DO NOT commit real values)
apiVersion: v1
kind: Secret
metadata:
  name: db-secrets
  namespace: garudapass
type: Opaque
stringData:
  url: "postgres://garudapass:CHANGE_ME@postgresql:5432/garudapass?sslmode=require"
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-secrets
  namespace: garudapass
type: Opaque
stringData:
  url: "redis://:CHANGE_ME@redis:6379"
---
apiVersion: v1
kind: Secret
metadata:
  name: identity-secrets
  namespace: garudapass
type: Opaque
stringData:
  nik-key: "CHANGE_ME_64_HEX_CHARS"
  field-encryption-key: "CHANGE_ME_64_HEX_CHARS"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: service-config
  namespace: garudapass
data:
  dukcapil-url: "https://api.dukcapil.go.id"
  ahu-url: "https://ahu.kemenkumham.go.id"
  oss-url: "https://oss.go.id"
  ejbca-url: "https://ejbca.garudapass.id"
  dss-url: "https://dss.garudapass.id"
---
# PVC for signing documents
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: garudasign-pvc
  namespace: garudapass
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard
