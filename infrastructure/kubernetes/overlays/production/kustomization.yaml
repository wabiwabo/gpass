apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: garudapass

resources:
  - ../../base

patches:
  # Production: increase replica counts
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: bff
      spec:
        replicas: 3
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: identity
      spec:
        replicas: 3
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: garudacorp
      spec:
        replicas: 2
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: garudasign
      spec:
        replicas: 2
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: garudaportal
      spec:
        replicas: 3
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: garudaaudit
      spec:
        replicas: 2

  # Production: increase resource limits
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: bff
      spec:
        template:
          spec:
            containers:
              - name: bff
                resources:
                  requests:
                    memory: "128Mi"
                    cpu: "250m"
                  limits:
                    memory: "512Mi"
                    cpu: "1000m"
