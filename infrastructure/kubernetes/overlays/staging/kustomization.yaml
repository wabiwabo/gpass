apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: garudapass-staging

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: bff
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
      - op: replace
        path: /spec/template/spec/containers/0/env/1/value
        value: staging

namePrefix: stg-
commonLabels:
  environment: staging
