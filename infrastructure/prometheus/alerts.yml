groups:
  - name: garudapass-slo
    rules:
      - alert: HighErrorRate
        expr: >
          (
            sum by (service) (rate(http_requests_total{class="5xx"}[5m]))
            /
            sum by (service) (rate(http_requests_total[5m]))
          ) > 0.01
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Error rate > 1% for {{ $labels.service }}"
          description: "Service {{ $labels.service }} has 5xx rate {{ $value | humanizePercentage }}"

      - alert: PanicsObserved
        expr: increase(http_panics_total[10m]) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Panic recovered in {{ $labels.service }}"
          description: "Recover middleware caught {{ $value }} panic(s) in last 10m. Investigate logs."

      - alert: DBPoolExhaustion
        expr: rate(db_pool_wait_count[5m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "DB pool exhaustion in {{ $labels.service }}"
          description: "Requests are waiting on DB connections. Consider increasing DB_MAX_OPEN_CONNS."

      - alert: DBPoolNearMax
        expr: db_pool_in_use / db_pool_open_connections > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "DB pool >90% utilized in {{ $labels.service }}"
          description: "in_use/open ratio is {{ $value | humanizePercentage }}; pool exhaustion imminent."

      - alert: GoroutineLeak
        expr: go_goroutines > 5000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Goroutine count > 5000 in {{ $labels.service }}"
          description: "Goroutine count is {{ $value }} — possible leak (handler not returning?)."

      - alert: HighLatency
        expr: histogram_quantile(0.99, sum by (service, le) (rate(http_request_duration_seconds_bucket[5m]))) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "P99 latency > 2s for {{ $labels.service }}"

      - alert: CircuitBreakerOpen
        expr: circuit_breaker_state > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Circuit breaker open: {{ $labels.service }} -> {{ $labels.target }}"

      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"

  - name: garudapass-business
    rules:
      - alert: HighSigningFailureRate
        expr: >
          (
            rate(documents_signed_total{result="failure"}[15m])
            /
            rate(documents_signed_total[15m])
          ) > 0.05
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Signing failure rate > 5%"

      - alert: WebhookDeliveryBacklog
        expr: webhook_deliveries_total{status="pending"} > 100
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Webhook delivery backlog > 100 pending"

  # Multi-window multi-burn-rate availability SLO (Google SRE Workbook ch. 5).
  # Target: 99.9% availability => 0.1% error budget. Two burn-rate alerts:
  #   - Fast burn (page): 14.4x over 1h consumes 2% budget in 1h => critical.
  #   - Slow burn (ticket): 6x over 6h consumes 5% budget in 6h => warning.
  # Short windows (5m, 30m) gate the alert to suppress noise from blips.
  - name: garudapass-slo-burnrate
    rules:
      - record: service:http_requests:error_ratio_rate5m
        expr: >
          sum by (service) (rate(http_requests_total{class="5xx"}[5m]))
          /
          sum by (service) (rate(http_requests_total[5m]))
      - record: service:http_requests:error_ratio_rate30m
        expr: >
          sum by (service) (rate(http_requests_total{class="5xx"}[30m]))
          /
          sum by (service) (rate(http_requests_total[30m]))
      - record: service:http_requests:error_ratio_rate1h
        expr: >
          sum by (service) (rate(http_requests_total{class="5xx"}[1h]))
          /
          sum by (service) (rate(http_requests_total[1h]))
      - record: service:http_requests:error_ratio_rate6h
        expr: >
          sum by (service) (rate(http_requests_total{class="5xx"}[6h]))
          /
          sum by (service) (rate(http_requests_total[6h]))

      - alert: SLOFastBurn
        expr: >
          service:http_requests:error_ratio_rate5m  > (14.4 * 0.001)
          and
          service:http_requests:error_ratio_rate1h  > (14.4 * 0.001)
        for: 2m
        labels:
          severity: critical
          slo: availability
        annotations:
          summary: "Fast SLO burn for {{ $labels.service }} (14.4x over 1h)"
          description: "At current 5m+1h error rate, the 30-day 99.9% budget will be exhausted in <2 days. Page oncall."

      - alert: SLOSlowBurn
        expr: >
          service:http_requests:error_ratio_rate30m > (6 * 0.001)
          and
          service:http_requests:error_ratio_rate6h  > (6 * 0.001)
        for: 15m
        labels:
          severity: warning
          slo: availability
        annotations:
          summary: "Slow SLO burn for {{ $labels.service }} (6x over 6h)"
          description: "At current 30m+6h error rate, the 30-day 99.9% budget will be exhausted in <5 days. Open ticket."
