groups:
  - name: garudapass-slo
    rules:
      - alert: HighErrorRate
        expr: >
          (
            rate(http_requests_total{status_code=~"5.."}[5m])
            /
            rate(http_requests_total[5m])
          ) > 0.01
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Error rate > 1% for {{ $labels.service }}"
          description: "Service {{ $labels.service }} has error rate {{ $value | humanizePercentage }}"

      - alert: HighLatency
        expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "P99 latency > 2s for {{ $labels.service }}"

      - alert: CircuitBreakerOpen
        expr: circuit_breaker_state > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Circuit breaker open: {{ $labels.service }} -> {{ $labels.target }}"

      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"

  - name: garudapass-business
    rules:
      - alert: HighSigningFailureRate
        expr: >
          (
            rate(documents_signed_total{result="failure"}[15m])
            /
            rate(documents_signed_total[15m])
          ) > 0.05
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Signing failure rate > 5%"

      - alert: WebhookDeliveryBacklog
        expr: webhook_deliveries_total{status="pending"} > 100
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Webhook delivery backlog > 100 pending"
