openapi: 3.1.0
info:
  title: GarudaPass Identity Service
  version: 0.1.0
  description: |
    Identity verification and registration service for GarudaPass.
    Handles NIK verification via Dukcapil integration and OTP-based registration flows.

servers:
  - url: http://localhost:4001
    description: Local development

tags:
  - name: Registration
    description: Identity registration endpoints
  - name: Health
    description: Service health checks

paths:
  /api/v1/register/initiate:
    post:
      operationId: initiateRegistration
      summary: Initiate identity registration
      description: |
        Verifies the provided NIK against Dukcapil, then sends OTPs
        to the user's phone and email to begin the registration flow.
      tags:
        - Registration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InitiateRequest"
      responses:
        "200":
          description: Registration initiated successfully. OTPs sent to phone and email.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InitiateResponse"
        "400":
          description: Invalid request or NIK validation failure.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidNIK:
                  summary: Invalid NIK format
                  value:
                    error: invalid_nik
                    message: "NIK must be exactly 16 digits"
                deceased:
                  summary: NIK belongs to deceased individual
                  value:
                    error: deceased
                    message: "NIK belongs to a deceased individual"
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Dukcapil service is unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: dukcapil_unavailable
                message: "Identity verification service is unavailable"

  /health:
    get:
      operationId: healthCheck
      summary: Health check
      description: Returns service health status.
      tags:
        - Health
      responses:
        "200":
          description: Service is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

components:
  schemas:
    InitiateRequest:
      type: object
      required:
        - nik
        - phone
        - email
      properties:
        nik:
          type: string
          description: Indonesian National Identity Number (16 digits).
          example: "3201012345670001"
        phone:
          type: string
          description: Phone number for OTP delivery.
          example: "+628123456789"
        email:
          type: string
          description: Email address for OTP delivery.
          example: "user@example.com"

    InitiateResponse:
      type: object
      properties:
        registration_id:
          type: string
          description: Unique registration session identifier (hex-encoded).
          example: "a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6"
        otp_expires_at:
          type: string
          format: date-time
          description: When the OTP codes expire.
          example: "2026-04-06T12:05:00Z"

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Machine-readable error code.
        message:
          type: string
          description: Human-readable error message.

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: "ok"
        service:
          type: string
          example: "identity"
