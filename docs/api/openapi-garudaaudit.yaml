openapi: 3.1.0
info:
  title: GarudaPass GarudaAudit Service
  version: 0.1.0
  description: |
    Immutable audit logging service for GarudaPass.
    Provides append-only event ingestion, queryable event retrieval with filtering and pagination,
    and aggregated statistics across all GarudaPass services.

servers:
  - url: http://localhost:4010
    description: Local development

tags:
  - name: Events
    description: Audit event ingestion and retrieval
  - name: Stats
    description: Audit statistics and aggregations
  - name: Health
    description: Service health checks

paths:
  /api/v1/audit/events:
    post:
      operationId: ingestEvent
      summary: Ingest an audit event
      description: |
        Appends an immutable audit event to the audit log.
        Events cannot be updated or deleted after ingestion.
      tags:
        - Events
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngestEventRequest"
      responses:
        "201":
          description: Audit event ingested successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditEvent"
        "400":
          description: Invalid request body or validation error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    get:
      operationId: queryEvents
      summary: Query audit events
      description: |
        Retrieves audit events matching the provided filter criteria.
        Supports pagination via limit and offset.
        Default limit is 100, maximum is 1000.
      tags:
        - Events
      parameters:
        - name: actor_id
          in: query
          schema:
            type: string
          description: Filter by actor ID.
        - name: resource_id
          in: query
          schema:
            type: string
          description: Filter by resource ID.
        - name: resource_type
          in: query
          schema:
            type: string
          description: Filter by resource type.
        - name: event_type
          in: query
          schema:
            type: string
          description: Filter by event type.
        - name: action
          in: query
          schema:
            type: string
          description: Filter by action.
        - name: service
          in: query
          schema:
            type: string
          description: Filter by originating service name.
        - name: status
          in: query
          schema:
            type: string
          description: Filter by event status.
        - name: from
          in: query
          schema:
            type: string
            format: date-time
          description: Start of time range (RFC3339).
        - name: to
          in: query
          schema:
            type: string
            format: date-time
          description: End of time range (RFC3339).
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            maximum: 1000
          description: Maximum number of events to return.
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
          description: Number of events to skip for pagination.
      responses:
        "200":
          description: Paginated audit event results.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryEventsResponse"
        "500":
          description: Query or count error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/audit/events/{id}:
    get:
      operationId: getEvent
      summary: Get a single audit event by ID
      tags:
        - Events
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Audit event ID.
      responses:
        "200":
          description: Audit event retrieved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditEvent"
        "400":
          description: Missing event ID.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Audit event not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/audit/stats:
    get:
      operationId: getStats
      summary: Get audit statistics
      description: |
        Returns aggregated statistics for audit events, broken down by action,
        service, and status. Optionally filtered by service and time range.
      tags:
        - Stats
      parameters:
        - name: service
          in: query
          schema:
            type: string
          description: Filter stats by originating service name.
        - name: from
          in: query
          schema:
            type: string
            format: date-time
          description: Start of time range (RFC3339).
        - name: to
          in: query
          schema:
            type: string
            format: date-time
          description: End of time range (RFC3339).
      responses:
        "200":
          description: Audit statistics.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsResponse"
        "500":
          description: Stats computation error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /health:
    get:
      operationId: healthCheck
      summary: Health check
      tags:
        - Health
      responses:
        "200":
          description: Service is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

components:
  schemas:
    IngestEventRequest:
      type: object
      required:
        - event_type
        - actor_id
        - action
        - service_name
      properties:
        event_type:
          type: string
          description: Category of the event (e.g., "auth", "signing", "consent").
        actor_id:
          type: string
          description: ID of the actor (user, service, or system) that triggered the event.
        actor_type:
          type: string
          description: Type of actor (e.g., "user", "service", "system").
        resource_id:
          type: string
          description: ID of the resource being acted upon.
        resource_type:
          type: string
          description: Type of resource (e.g., "certificate", "document", "consent").
        action:
          type: string
          description: Action performed (e.g., "cert.issued", "doc.signed", "consent.granted").
        metadata:
          type: object
          additionalProperties:
            type: string
          description: Key-value metadata for the event.
        ip_address:
          type: string
          description: IP address of the request origin.
        user_agent:
          type: string
          description: User-Agent header value.
        service_name:
          type: string
          description: Name of the service emitting the event.
        request_id:
          type: string
          description: Correlation request ID for tracing.
        status:
          type: string
          description: Outcome status (e.g., "success", "failure").

    AuditEvent:
      type: object
      properties:
        id:
          type: string
          description: Unique event identifier.
        event_type:
          type: string
        actor_id:
          type: string
        actor_type:
          type: string
        resource_id:
          type: string
        resource_type:
          type: string
        action:
          type: string
        metadata:
          type: object
          additionalProperties:
            type: string
        ip_address:
          type: string
        user_agent:
          type: string
        service_name:
          type: string
        request_id:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time
          description: Timestamp when the event was recorded (server-assigned).

    QueryEventsResponse:
      type: object
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/AuditEvent"
        total:
          type: integer
          format: int64
          description: Total number of events matching the filter (for pagination).
        limit:
          type: integer
          description: Limit applied to this query.
        offset:
          type: integer
          description: Offset applied to this query.

    StatsResponse:
      type: object
      properties:
        total_events:
          type: integer
          format: int64
        by_action:
          type: object
          additionalProperties:
            type: integer
            format: int64
          description: Event counts grouped by action.
        by_service:
          type: object
          additionalProperties:
            type: integer
            format: int64
          description: Event counts grouped by originating service.
        by_status:
          type: object
          additionalProperties:
            type: integer
            format: int64
          description: Event counts grouped by status.

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Machine-readable error code.
        message:
          type: string
          description: Human-readable error message.

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: "ok"
        service:
          type: string
          example: "garudaaudit"
