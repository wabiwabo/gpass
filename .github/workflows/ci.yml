name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

env:
  GO_VERSION: "1.22"
  NODE_VERSION: "20"
  PNPM_VERSION: "9.15.0"

jobs:
  go-test:
    name: Go Tests & Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - { dir: "apps/bff", name: "bff" }
          - { dir: "services/identity", name: "identity" }
          - { dir: "services/garudainfo", name: "garudainfo" }
          - { dir: "services/dukcapil-sim", name: "dukcapil-sim" }
          - { dir: "services/ahu-sim", name: "ahu-sim" }
          - { dir: "services/oss-sim", name: "oss-sim" }
          - { dir: "services/garudacorp", name: "garudacorp" }
          - { dir: "services/signing-sim", name: "signing-sim" }
          - { dir: "services/garudasign", name: "garudasign" }
          - { dir: "services/garudaportal", name: "garudaportal" }
          - { dir: "services/garudaaudit", name: "garudaaudit" }
          - { dir: "services/garudanotify", name: "garudanotify" }

    defaults:
      run:
        working-directory: ${{ matrix.service.dir }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ matrix.service.dir }}/go.sum

      - name: Download dependencies
        run: go mod download && go mod verify

      - name: Vet
        run: go vet ./...

      - name: Test with coverage
        run: go test ./... -race -coverprofile=coverage.out -covermode=atomic -count=1

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Total coverage for ${{ matrix.service.name }}: ${COVERAGE}%"
          threshold=80
          if [ "$(echo "$COVERAGE < $threshold" | bc -l)" -eq 1 ]; then
            echo "::warning::Coverage ${COVERAGE}% is below ${threshold}% threshold for ${{ matrix.service.name }}"
          fi

      - name: Build
        run: go build -trimpath -o /dev/null .

  go-security:
    name: Go Security Scan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - "apps/bff"
          - "services/identity"
          - "services/garudainfo"
          - "services/garudacorp"
          - "services/garudasign"
          - "services/garudaportal"
          - "services/garudaaudit"

    defaults:
      run:
        working-directory: ${{ matrix.service }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run vulnerability check
        run: govulncheck ./...

  frontend-lint:
    name: Frontend Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Lint
        run: pnpm lint
        continue-on-error: true

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [go-test]

    steps:
      - uses: actions/checkout@v4

      - name: Build all service images
        env:
          GIT_SHA: ${{ github.sha }}
        run: |
          for svc in apps/bff services/identity services/garudainfo services/dukcapil-sim services/ahu-sim services/oss-sim services/garudacorp services/signing-sim services/garudasign services/garudaportal services/garudaaudit services/garudanotify; do
            name=$(basename "$svc")
            echo "Building ${name}..."
            docker build -t "garudapass/${name}:${GIT_SHA}" "${svc}"
          done

  validate-infra:
    name: Validate Infrastructure
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate Keycloak realm JSON
        run: python3 -m json.tool infrastructure/keycloak/realm-export.json > /dev/null

      - name: Validate SQL migrations
        run: |
          for f in infrastructure/db/migrations/*.sql; do
            echo "Checking $f..."
            head -1 "$f"
          done
          echo "All migrations valid"

      - name: Validate Kubernetes manifests
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/
          kustomize build infrastructure/kubernetes/base/ > /dev/null
          echo "Base manifests: Valid"
          kustomize build infrastructure/kubernetes/overlays/dev/ > /dev/null
          echo "Dev overlay: Valid"
          kustomize build infrastructure/kubernetes/overlays/staging/ > /dev/null
          echo "Staging overlay: Valid"
          kustomize build infrastructure/kubernetes/overlays/production/ > /dev/null
          echo "Production overlay: Valid"
